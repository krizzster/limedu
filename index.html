<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>limedu | Classroom Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">

    <div id="loader-container" class="hidden">
        <div class="spinner"></div>
        <p class="loading-text" id="loader-text">Syncing with limedu Feed...</p>
    </div>

    <div id="login-container" class="login-wrapper fade-in">
        <div class="social-login-card">
            <div class="brand-mascot">🎒</div>
            <h2>limedu Crew</h2>
            <p>Jump back into your friend hub</p>
            <div class="input-field-group">
                <i class="fas fa-user-tag"></i>
                <input type="text" id="username" placeholder="Your Full Name" required>
            </div>
            <div class="input-field-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Passcode Key" required>
            </div>
            <button id="login-btn" onclick="handleLogin()">Login</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div id="app-container" class="app-layout hidden">
        
        <header class="app-top-bar">
            <div class="brand-meta">
                <span class="brand-name" id="group-title-label">limedu</span>
                <span class="brand-badge" id="app-badge-mode">FEED</span>
            </div>
            <button id="theme-toggle" class="icon-action-btn" onclick="toggleTheme()" title="Toggle Interface Aesthetics">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <main class="workspace-stage">
            
            <section id="view-feed" class="tab-view-panel">
                <div class="status-banner-card" id="user-status-banner-card">
                    <div class="status-profile-block">
                        <div class="avatar-frame" id="top-user-avatar">?</div>
                        <div class="status-meta">
                            <h4 id="top-display-name">Active Session</h4>
                            <input type="text" id="custom-status-input" placeholder="What are you working on?" onchange="syncCustomStatus()">
                        </div>
                    </div>
                </div>

                <div class="filter-scroller-wrapper">
                    <div class="filter-row" id="subject-filter-rack">
                        </div>
                </div>

                <div class="feed-grid-stream" id="social-feed-stream"></div>
            </section>

            <section id="view-leaderboard" class="tab-view-panel hidden">
                <div class="showcase-card shadow-card animate-card">
                    <div class="showcase-header">
                        <h3><i class="fas fa-chart-bar text-gold"></i> Hub Analytics</h3>
                        <p>Who is carrying the crew storage?</p>
                    </div>
                    <div class="leaderboard-table-wrapper">
                        <div id="leaderboard-anchor-body" style="display: flex; flex-direction: column; gap: 12px; padding-top: 1rem;">
                            </div>
                    </div>
                </div>
            </section>

            <section id="view-updates" class="tab-view-panel hidden">
                <div class="showcase-card shadow-card animate-card">
                    <div class="showcase-header">
                        <h3><i class="fas fa-sticky-note"></i> Shared Workspace Notes</h3>
                        <p>Quick memos, links, and updates for the group</p>
                    </div>
                    <div id="workspace-notes-container" style="padding-top: 1.5rem;">
                        </div>
                </div>
            </section>

            <section id="view-profile" class="tab-view-panel hidden">
                <div id="dynamic-profile-view-target">
                    </div>
            </section>

        </main>

        <nav class="app-hotbar">
            <div class="hotbar-navigation">
                <button class="hotbar-tab active" id="tab-feed" onclick="switchActiveTab('feed')">
                    <i class="fas fa-stream"></i>
                    <span>Feed</span>
                </button>
                <button class="hotbar-tab" id="tab-leaderboard" onclick="switchActiveTab('leaderboard')">
                    <i class="fas fa-trophy"></i>
                    <span>Stats</span>
                </button>
                
                <div class="hotbar-action-center">
                    <button class="action-trigger-btn" onclick="openUploadModal(event)">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>

                <button class="hotbar-tab" id="tab-updates" onclick="switchActiveTab('updates')">
                    <i class="fas fa-history"></i>
                    <span>Memos</span>
                </button>
                <button class="hotbar-tab" id="tab-profile" onclick="switchActiveTab('profile')">
                    <i class="fas fa-user-cog"></i>
                    <span>Profile</span>
                </button>
            </div>
        </nav>
    </div>

    <div id="upload-modal" class="modal-overlay hidden" onclick="closeUploadModal()">
        <div class="modal-window" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3><i class="fas fa-cloud-upload-alt"></i> Stage Asset Package</h3>
                <button class="close-modal-btn" onclick="closeUploadModal()">&times;</button>
            </div>
            <div class="modal-body-form">
                <div class="input-group">
                    <label>Assignment Label / Description Name</label>
                    <input type="text" id="modal-file-title" placeholder="E.g., Surface Area Chapter Notes">
                </div>
                <div class="input-group">
                    <label>Subject Category</label>
                    <select id="modal-file-subject" onchange="handleSubjectChange()">
                        <option value="Science">Science</option>
                        <option value="English">English</option>
                        <option value="Social Science">Social Science</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Maths">Maths</option>
                        <option value="Sanskrit">Sanskrit</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div id="dynamic-subcategories-wrapper"></div>
                
                <div class="input-group" style="margin-top: 10px;">
                    <label>Additional Notes Context</label>
                    <input type="text" id="modal-file-desc" placeholder="Optional context or comments">
                </div>

                <div class="input-group" style="margin-top: 14px;">
                    <label class="file-dropzone-label">
                        <i class="fas fa-file-pdf"></i>
                        <span id="file-chosen-text">Tap to attach files/images</span>
                        <input type="file" id="modal-file-input" onchange="updateFileLabel()" accept="application/pdf, image/*" multiple style="display:none;">
                    </label>
                </div>
                <button id="modal-upload-btn" onclick="triggerSupabaseUploadPipeline()">Publish to Feed Stream 🚀</button>
                <p id="upload-error" class="error-msg" style="text-align:center; margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <div id="theatre-lightbox" class="theatre-overlay hidden" onclick="closeMediaTheatre()">
        <div class="theatre-window" onclick="event.stopPropagation()">
            <div class="theatre-navbar">
                <span class="theatre-title" id="theatre-filename-label">Asset Viewer</span>
                <button class="theatre-close-btn" onclick="closeMediaTheatre()">&times;</button>
            </div>
            <div class="theatre-stage" id="theatre-view-viewport"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
