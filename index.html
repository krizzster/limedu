<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>limedu | Classroom Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">

    <div id=\"loader-container\" class=\"hidden\">
        <div class=\"spinner\"></div>
        <p class=\"loading-text\" id=\"loader-text\">Syncing with limedu Feed...</p>
    </div>

    <div id="login-container" class="login-wrapper fade-in">
        <div class="social-login-card">
            <div class="brand-mascot">🎒</div>
            <h2>limedu Crew</h2>
            <p>Jump back into your friend hub</p>
            <div class="input-field-group">
                <i class="fas fa-user-tag"></i>
                <input type="text" id="username" placeholder="Your Full Name" required>
            </div>
            <div class="input-field-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Passcode Key" required>
            </div>
            <button id="login-btn" onclick="handleLogin()">Log In</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div id="dashboard-container" class="hidden">
        
        <header class="app-top-bar">
            <div class="top-bar-inner">
                <div class="branding-block">
                    <span class="hub-logo-mark">limedu</span>
                </div>
                
                <div class="header-action-nodes">
                    <button id="theme-toggle" class="utility-icon-btn" onclick="toggleTheme()" title="Switch Aesthetics Matrix">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button id="logout-btn" class="utility-icon-btn critical-exit" onclick="handleLogout()" title="Disconnect Grid Session">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="main-workspace-scroller">
            <div class="main-column-feed-wrapper">
                
                <div class="user-identity-profile-card">
                    <div class="identity-layout-row">
                        <div id="user-avatar-slot" class="user-avatar">
                            <img src="https://ui-avatars.com/api/?name=User&background=1877f2&color=fff&bold=true" alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                        </div>
                        <div class="identity-text-details">
                            <h3 id="user-name-label">Loading Identity Vector...</h3>
                            <div class="dynamic-status-input-container">
                                <input type="text" id="user-status-input" placeholder="Set a status custom flag..." maxlength="70">
                                <button class="status-sync-btn" onclick="synchronizeStatusUpdate()" title="Save Status Matrix">
                                    <i class="fas fa-check"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="friends-hotbar-container">
                    <div class="hotbar-header">
                        <span class="section-title">THE 6B CREW</span>
                    </div>
                    <div class="hotbar-scroll-track" id="friends-status-list">
                        </div>
                </div>

                <div class="quick-publish-banner-card" onclick="openUploadModal(event)">
                    <div class="publish-prompt-row">
                        <div class="mini-avatar-placeholder">
                            <i class="fas fa-cloud-upload-alt"></i>
                        </div>
                        <div class="fake-input-field">Share configuration payloads or images...</div>
                    </div>
                </div>

                <div class="filter-row-scroller-shell">
                    <div class="filter-row">
                        <button class="filter-chip-btn active" onclick="handleSubjectFilterSelection(this, 'All')">All Feeds</button>
                        <button class="filter-chip-btn" onclick="handleSubjectFilterSelection(this, 'Science')">Science</button>
                        <button class="filter-chip-btn" onclick="handleSubjectFilterSelection(this, 'English')">English</button>
                        <button class="filter-chip-btn" onclick="handleSubjectFilterSelection(this, 'Social Science')">Social Sci</button>
                        <button class="filter-chip-btn" onclick="handleSubjectFilterSelection(this, 'Hindi')">Hindi</button>
                        <button class="filter-chip-btn" onclick="handleSubjectFilterSelection(this, 'Maths')">Maths</button>
                        <button class="filter-chip-btn" onclick="handleSubjectFilterSelection(this, 'Sanskrit')">Sanskrit</button>
                        <button class="filter-chip-btn" onclick="handleSubjectFilterSelection(this, 'Other')">Other Docs</button>
                    </div>
                </div>

                <div id="feed-stream-interactive-container" class="feed-stream-timeline">
                    </div>
                
            </div>
        </main>
    </div>

    <div id="upload-modal" class="modal-overlay hidden" onclick="closeUploadModal()">
        <div class="modal-card-window animate-slide-up" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>📤 Package Document Payload</h3>
                <button class="close-modal-btn" onclick="closeUploadModal()">&times;</button>
            </div>
            <div class="modal-body">
                
                <div class="input-group">
                    <label>Configuration Subject Array</label>
                    <select id="modal-file-subject" onchange="handleSubjectChange()">
                        <option value="Science">Science</option>
                        <option value="English">English</option>
                        <option value="Social Science">Social Science</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Maths">Maths</option>
                        <option value="Sanskrit">Sanskrit</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div id="dynamic-subcategories-wrapper"></div>

                <div class="input-group" style="margin-top: 14px;">
                    <label>Context Blueprint Metadata Info</label>
                    <textarea id="modal-file-desc" placeholder="Optional notes..."></textarea>
                </div>

                <div class="input-group" style="margin-top: 14px;">
                    <label class="file-dropzone-label">
                        <i class="fas fa-file-pdf"></i>
                        <span id="file-chosen-text">Tap to attach files/images</span>
                        <input type="file" id="modal-file-input" onchange="updateFileLabel()" accept="application/pdf, image/*" multiple style="display:none;">
                    </label>
                </div>
                <button id="modal-upload-btn" onclick="triggerSupabaseUploadPipeline()">Publish to Feed Stream 🚀</button>
                <p id="upload-error" class="error-msg" style="text-align:center; margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <div id="theatre-lightbox" class="theatre-overlay hidden" onclick="closeMediaTheatre()">
        <div class="theatre-window" onclick="event.stopPropagation()">
            <div class="theatre-navbar">
                <span class="theatre-title" id="theatre-filename-label">Asset Viewer</span>
                <button class="theatre-close-btn" onclick="closeMediaTheatre()">&times;</button>
            </div>
            <div class="theatre-stage" id="theatre-view-viewport"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
