<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>limedu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">

    <div id="loader-container" class="hidden">
        <div class="spinner"></div>
        <p class="loading-text" id="loader-text">Synchronizing limedu Data...</p>
    </div>

    <div id="login-container" class="login-wrapper fade-in">
        <div class="card">
            <h2>🎒 limedu Crew Login</h2>
            <p>Connect with your hub workspace</p>
            <div class=\"input-group\">
                <input type="text" id="username" placeholder="Your Name (e.g. Neyansh Naksh)" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button id="login-btn" onclick="handleLogin()">Login</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div id="app-container" class="app-layout hidden">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="brand-logo">🎒</span>
                <span class="brand-name">limedu</span>
            </div>
            <nav class="sidebar-menu">
                <button class="nav-item active" onclick="switchSection('feed')">
                    <i class="fas fa-stream"></i> <span>Feed Workspace</span>
                </button>
                <button class="nav-item" onclick="switchSection('members')">
                    <i class="fas fa-users"></i> <span>Crew Directory</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="user-badge">
                    <div class="avatar" id="user-avatar">?</div>
                    <div class="user-info">
                        <span class="user-name" id="current-user-display">Guest</span>
                        <span class="user-role" id="current-user-class">Class --</span>
                    </div>
                </div>
                <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="feed-search" placeholder="Filter dynamic feed content..." oninput="filterFeed()">
                </div>
                <div class="top-bar-actions">
                    <button class="action-circle-btn" id="theme-toggle" onclick="toggleTheme()">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="action-circle-btn" onclick="openStatusModal()">
                        <i class="fas fa-comment-alt"></i>
                    </button>
                    <button class="primary-btn" onclick="openUploadModal()">
                        <i class="fas fa-cloud-upload-alt"></i> Upload Asset
                    </button>
                </div>
            </header>

            <section id="section-feed" class="content-section">
                <div class="filter-row">
                    <button class="filter-tag active" onclick="filterSubject('All')">All Subjects</button>
                    <button class="filter-tag" onclick="filterSubject('Science')">Science</button>
                    <button class="filter-tag" onclick="filterSubject('English')">English</button>
                    <button class="filter-tag" onclick="filterSubject('Social Science')">Social Science</button>
                    <button class="filter-tag" onclick="filterSubject('Hindi')">Hindi</button>
                    <button class="filter-tag" onclick="filterSubject('Maths')">Maths</button>
                    <button class="filter-tag" onclick="filterSubject('Sanskrit')">Sanskrit</button>
                    <button class="filter-tag" onclick="filterSubject('Other')">Other</button>
                </div>
                <div class="feed-grid" id="feed-container"></div>
            </section>

            <section id="section-members" class="content-section hidden">
                <div class="members-grid" id="members-container"></div>
            </section>
        </main>
    </div>

    <div id="status-modal" class="modal-backdrop hidden" onclick="closeStatusModal()">
        <div class="modal-card modal-bottom-sheet" onclick="event.stopPropagation()">
            <div class="modal-drag-handle"></div>
            <div class="modal-header">
                <h3><i class="fas fa-comment-alt"></i> Broadcast Status</h3>
                <button class="close-modal-btn" onclick="closeStatusModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Your Current Status Message</label>
                    <input type="text" id="modal-status-input" placeholder="What are you working on right now?">
                </div>
                <button id="modal-status-btn" onclick="triggerStatusSyncPipeline()">Broadcast Update</button>
            </div>
        </div>
    </div>

    <div id="upload-modal" class="modal-backdrop hidden" onclick="closeUploadModal()">
        <div class="modal-card modal-bottom-sheet" onclick="event.stopPropagation()">
            <div class="modal-drag-handle"></div>
            <div class="modal-header">
                <h3><i class="fas fa-cloud-upload-alt"></i> Upload Workspace Asset</h3>
                <button class="close-modal-btn" onclick="closeUploadModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Asset Display Name</label>
                    <input type="text" id="modal-file-name" placeholder="E.g., Chapter 4 Notes, Assignments">
                </div>
                <div class="input-group">
                    <label>Description Note (Optional)</label>
                    <input type="text" id="modal-file-meta" placeholder="Add useful context details...">
                </div>
                <div class="input-group">
                    <label>Subject Category</label>
                    <select id="modal-file-subject" onchange="handleSubjectChange()">
                        <option value="Science">Science</option>
                        <option value="English">English</option>
                        <option value="Social Science">Social Science</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Maths">Maths</option>
                        <option value="Sanskrit">Sanskrit</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div id="dynamic-subcategories-wrapper"></div>
                <div class="input-group">
                    <label class="file-dropzone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span id="file-chosen-text">Upload PDF or Multiple Images</span>
                        <input type="file" id="modal-file-input" onchange="updateFileLabel()\" accept="application/pdf, image/*" multiple style="display:none;">
                    </label>
                </div>
                <button id="modal-upload-btn" onclick="triggerSupabaseUploadPipeline()">Publish to Feed</button>
                <p id="upload-error" class="error-msg" style="text-align:center;"></p>
            </div>
        </div>
    </div>

    <div id="theatre-lightbox" class="theatre-overlay" onclick="closeMediaTheatre()">
        <div class="theatre-window" onclick="event.stopPropagation()">
            <div class="theatre-navbar">
                <span class="theatre-title" id="theatre-filename-label">View Share Asset</span>
                <button class="theatre-close-btn" onclick="closeMediaTheatre()">&times;</button>
            </div>
            <div class="theatre-stage" id="theatre-view-viewport"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
