<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6B Crew</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">

    <div id="loader-container" class="hidden">
        <div class="spinner"></div>
        <p class="loading-text" id="loader-text">Synchronizing Hub Data...</p>
    </div>

    <div id="login-container" class="login-wrapper fade-in">
        <div class="card">
            <h2>🎒 6B Crew Login</h2>
            <p>Connect with your 6B crew</p>
            <div class="input-group">
                <input type="text" id="username" placeholder="Your Name (e.g. Kriz)" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button id="login-btn" onclick="handleLogin()">Login</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div id="dashboard-container" class="hidden fade-in">
        <header class="main-header">
            <div class="header-branding">
                <h1 id="hub-title">The 6B Pirate Crew</h1>
                <p class="subtitle">Connected across 7th Grade 🎓</p>
            </div>
            
            <div class="header-controls">
                <button id="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>

                <div class="profile-wrapper" id="profileWrapper" onclick="toggleDropdown(event)">
                    <span class="profile-username-hover" id="hoverUsername">Guest</span>
                    <div class="avatar-placeholder">6B</div>
                    
                    <div class="profile-dropdown hidden" id="profileDropdown">
                        <div class="status-updater-box" onclick="event.stopPropagation()">
                            <input type="text" id="status-input" placeholder="Update status...">
                            <button onclick="updateLiveStatus()"><i class="fas fa-check"></i></button>
                        </div>
                        <a href="#" onclick="openUploadModal(event)"><i class="fas fa-upload"></i> Upload File</a>
                        <a href="#" class="dropdown-logout" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Log Out</a>
                    </div>
                </div>
            </div>
        </header>

        <div class="filter-bar-container">
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterSubject('all')">All</button>
                <button class="filter-btn" onclick="filterSubject('Math')">Math</button>
                <button class="filter-btn" onclick="filterSubject('Science')">Science</button>
                <button class="filter-btn" onclick="filterSubject('English')">English</button>
                <button class="filter-btn" onclick="filterSubject('History')">History</button>
            </div>
        </div>

        <main id="friends-grid" class="grid">
            </main>
    </div>

    <div id="upload-modal" class="modal-overlay hidden" onclick="closeUploadModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3><i class="fas fa-file-upload"></i> Upload to Repo</h3>
                <button class="close-modal-btn" onclick="closeUploadModal()">&times;</button>
            </div>
            
            <div class="modal-body">
                <div class="input-group">
                    <label>File Custom Display Name</label>
                    <input type="text" id="modal-file-name" placeholder="e.g., Algebra Assignment 3">
                </div>
                <div class="input-group">
                    <label>Subject</label>
                    <select id="modal-file-subject">
                        <option value="Math">Math</option>
                        <option value="Science">Science</option>
                        <option value="English">English</option>
                        <option value="History">History</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="file-dropzone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span id="file-chosen-text">Choose PDF/File</span>
                        <input type="file" id="modal-file-input" onchange="updateFileLabel()" style="display:none;">
                    </label>
                </div>
                <button id="modal-upload-btn" onclick="triggerGitHubUpload()">Push Live to Hub</button>
                <p id="upload-error" class="error-msg" style="text-align:center;"></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
