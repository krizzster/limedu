<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>limedu | Classroom Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">

    <!-- Sync Screen Loader Canvas -->
    <div id="loader-container" class="hidden">
        <div class="spinner"></div>
        <p class="loading-text" id="loader-text">Syncing with limedu Feed...</p>
    </div>

    <!-- Social Authentication Entry Gate -->
    <div id="login-container" class="login-wrapper fade-in">
        <div class="social-login-card">
            <div class="brand-mascot">🎒</div>
            <h2>limedu Crew</h2>
            <p>Jump back into your friend hub</p>
            <div class="input-field-group">
                <i class="fas fa-user-tag"></i>
                <input type="text" id="username" placeholder="Your Full Name" required>
            </div>
            <div class="input-field-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Passcode Key" required>
            </div>
            <button id="login-btn" onclick="handleLogin()">Enter Workspace <i class="fas fa-arrow-right"></i></button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <!-- Active Workspace Engine -->
    <div id="app-container" class="app-layout hidden">
        
        <!-- Left Side Controller Column -->
        <aside class="sidebar-panel">
            <div class="hub-header">
                <span class="hub-icon">✨</span>
                <div class="hub-branding">
                    <h1 id="group-title-label">The Hub</h1>
                    <span class="workspace-badge">Active Station</span>
                </div>
            </div>

            <!-- Profile Interactive Status Deck -->
            <div class="current-user-card">
                <div class="profile-avatar" id="current-user-avatar">?</div>
                <div class="profile-details">
                    <h3 id="current-user-name">Loading...</h3>
                    <span id="current-user-class">Class --</span>
                </div>
            </div>

            <div class="status-config-box">
                <label><i class="fas fa-comment-dots"></i> Update Broadcast</label>
                <div class="status-input-row">
                    <input type="text" id="custom-status-input" placeholder="What are you working on?">
                    <button onclick="syncCustomStatus()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <!-- Subject Shortcut Nav List -->
            <nav class="hub-navigation">
                <span class="menu-label">Subject Portals</span>
                <div class="filter-row" id="subject-filter-rack">
                    <!-- Dynamic subject buttons render here -->
                </div>
            </nav>

            <div class="sidebar-action-footer">
                <button class="utility-pill-btn" id="theme-toggle" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i> Dark Mode
                </button>
            </div>
        </aside>

        <!-- Main Center Stream Workspace -->
        <main class="main-stream-area">
            <header class="stream-header-bar">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="global-search-bar" oninput="renderFeedStream()" placeholder="Search documents, configurations, or friends...">
                </div>
            </header>

            <!-- Social Feed Stream Context Container -->
            <section class="feed-canvas" id="social-feed-stream">
                <!-- Interactive social post components mount here dynamically -->
            </section>
        </main>

        <!-- Pinned Interaction Bottom Bar -->
        <div class="interaction-hotbar">
            <button class="hotbar-action-node primary" onclick="openUploadModal(event)">
                <i class="fas fa-plus"></i> Share Asset
            </button>
        </div>
    </div>

    <!-- Resource Publisher Panel Modal Drawer -->
    <div id="upload-modal" class="modal-overlay hidden" onclick="closeUploadModal()">
        <div class="modal-window" onclick="event.stopPropagation()">
            <div class="modal-drag-handle"></div>
            <div class="modal-header">
                <h3><i class="fas fa-cloud-upload-alt"></i> Share New Asset</h3>
                <button class="close-modal-btn" onclick="closeUploadModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Resource Title</label>
                    <input type="text" id="modal-file-title" placeholder="e.g., Biology Lab Framework, Math Test Pack">
                </div>
                <div class="input-group">
                    <label>Description Note</label>
                    <input type="text" id="modal-file-desc" placeholder="Add custom context for your friends...">
                </div>
                <div class="input-group">
                    <label>Subject Category</label>
                    <select id="modal-file-subject" onchange="handleSubjectChange()">
                        <option value="Science">Science</option>
                        <option value="English">English</option>
                        <option value="Social Science">Social Science</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Maths">Maths</option>
                        <option value="Sanskrit">Sanskrit</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div id="dynamic-subcategories-wrapper"></div>
                
                <div class="input-group">
                    <label class="file-dropzone-label">
                        <i class="fas fa-file-pdf"></i>
                        <span id="file-chosen-text">Tap to attach files/images</span>
                        <input type="file" id="modal-file-input" onchange="updateFileLabel()" accept="application/pdf, image/*" multiple style="display:none;">
                    </label>
                </div>
                <button id="modal-upload-btn" onclick="triggerSupabaseUploadPipeline()">Publish to Feed Stream 🚀</button>
                <p id="upload-error" class="error-msg" style="text-align:center;"></p>
            </div>
        </div>
    </div>

    <!-- Media Immersion Lightbox Overlay -->
    <div id="theatre-lightbox" class="theatre-overlay hidden" onclick="closeMediaTheatre()">
        <div class="theatre-window" onclick="event.stopPropagation()">
            <div class="theatre-navbar">
                <span class="theatre-title" id="theatre-filename-label">Asset Viewer</span>
                <button class="theatre-close-btn" onclick="closeMediaTheatre()">&times;</button>
            </div>
            <div class="theatre-stage" id="theatre-view-viewport"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
