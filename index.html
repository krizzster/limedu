<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>limedu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">

    <div id=\"loader-container\" class="hidden">
        <div class="spinner"></div>
        <p class="loading-text" id="loader-text">Synchronizing limedu Data...</p>
    </div>

    <div id="login-container" class="login-wrapper fade-in">
        <div class="card">
            <h2>🎒 limedu Crew Login</h2>
            <p>Connect with your hub workspace</p>
            <div class="input-group">
                <input type="text" id="username" placeholder="Your Name (e.g. Neyansh Naksh)" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button id="login-btn" onclick="handleLogin()">Login</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div id="dashboard-container" class="app-container hidden">
        <header class="header-nav">
            <div class="hub-branding">
                <h1 id="hub-title">limedu</h1>
                <div class="hub-meta-badge">
                    <span class="hub-tag">Feed</span>
                </div>
            </div>
            <div class="action-control-buttons">
                <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
                <button class="icon-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="status-row-card">
            <div class="status-avatar" id="my-avatar">LM</div>
            <div class="status-input-wrapper">
                <input type="text" id="status-input" placeholder="Set custom workspace status broadcast...">
                <button class="status-sync-btn" onclick="updateLiveStatus()">Broadcast</button>
            </div>
        </div>

        <div id="tab-feed" class="tab-panel">
            <div class="filter-bar-container">
                <button class="filter-btn active" onclick="filterSubject('all')">All Shares</button>
                <button class="filter-btn" onclick="filterSubject('Science')">Science</button>
                <button class="filter-btn" onclick="filterSubject('Maths')">Maths</button>
                <button class="filter-btn" onclick="filterSubject('English')">English</button>
                <button class="filter-btn" onclick="filterSubject('Social Science')">Social Science</button>
                <button class="filter-btn" onclick="filterSubject('Hindi')">Hindi</button>
                <button class="filter-btn" onclick="filterSubject('Sanskrit')">Sanskrit</button>
                <button class="filter-btn" onclick="filterSubject('Other')">Other</button>
            </div>
            <div class="feed-stream" id="global-feed"></div>
        </div>

        <div id="tab-leaderboard" class="tab-panel hidden">
            <div class="leader-board-card">
                <h3>📈 Contributor Leaderboards</h3>
                <div class="leader-list" id="leaderboard-list"></div>
            </div>
        </div>

        <div id="tab-notes" class="tab-panel hidden">
            <div class="leader-board-card">
                <h3>📝 Personal Profiles & Memos</h3>
                <p style="color:var(--text-muted); font-size:0.9rem; font-weight:600;">Workspace profiles subsystem loading next stage module parameters...</p>
            </div>
        </div>

        <nav class="hotbar-navigation">
            <button class="hotbar-item active" id="nav-feed" onclick="switchTab('feed')">
                <i class="fas fa-layer-group"></i><span>Feed</span>
            </button>
            <button class="hotbar-item" id="nav-leaderboard" onclick="switchTab('leaderboard')">
                <i class="fas fa-trophy"></i><span>Stats</span>
            </button>
            <button class="hotbar-item" id="nav-notes" onclick="switchTab('notes')">
                <i class="fas fa-user"></i><span>Profiles</span>
            </button>
            <button class="hotbar-item" style="color:var(--accent)" onclick="openUploadModal(event)">
                <i class="fas fa-plus-circle" style="font-size:1.3rem"></i><span>Share</span>
            </button>
        </nav>
    </div>

    <div id="upload-modal" class="modal-overlay" onclick="closeUploadModal(event)">
        <div class="modal-drawer" onclick="event.stopPropagation()">
            <div class="modal-drag-handle"></div>
            <div class="modal-header">
                <h3><i class="fas fa-cloud-upload-alt" style="color:var(--accent)"></i> Publish Asset</h3>
                <button class="close-modal-btn" onclick="closeUploadModal(event)">&times;</button>
            </div>
            <div class="modal-body-form">
                <div class="input-group">
                    <label>Display Reference Name</label>
                    <input type="text" id="modal-file-name" placeholder="e.g., Chapter 3 Geometry Proofs">
                </div>
                <div class="input-group">
                    <label>Subject Category</label>
                    <select id="modal-file-subject" onchange="handleSubjectChange()">
                        <option value="Science">Science</option>
                        <option value="English">English</option>
                        <option value="Social Science">Social Science</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Maths">Maths</option>
                        <option value="Sanskrit">Sanskrit</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div id="dynamic-subcategories-wrapper"></div>
                <div class="input-group">
                    <label class="file-dropzone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span id="file-chosen-text">Upload PDF or Multiple Images</span>
                        <input type="file" id="modal-file-input" onchange="updateFileLabel()" accept="application/pdf, image/*" multiple style="display:none;">
                    </label>
                </div>
                <button id="modal-upload-btn" onclick="triggerSupabaseUploadPipeline()">Publish to Feed</button>
                <p id="upload-error" class="error-msg" style="text-align:center;"></p>
            </div>
        </div>
    </div>

    <div id="theatre-lightbox" class="theatre-overlay" onclick="closeMediaTheatre()">
        <div class="theatre-window" onclick="event.stopPropagation()">
            <div class="theatre-navbar">
                <span class="theatre-title" id="theatre-filename-label">View Share Asset</span>
                <button class="theatre-close-btn" onclick="closeMediaTheatre()">&times;</button>
            </div>
            <div class="theatre-stage" id="theatre-view-viewport"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
