<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6B Survivors Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loader-container" class="hidden">
        <div class="spinner"></div>
        <p class="loading-text">Synchronizing Hub Data...</p>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-container" class="card fade-in">
        <h2>🎒 Friend Hub Login</h2>
        <p>Connect with your 6B crew</p>
        <div class="input-group">
            <input type="text" id="username" placeholder="Your Name (e.g. Kriz)" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button id="login-btn" onclick="handleLogin()">Login</button>
        <p id="login-error" class="error-msg"></p>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-container" class="hidden fade-in">
        <header>
            <div>
                <h1 id="hub-title">The 6B Survivors Hub</h1>
                <p class="subtitle">Connected across 7th Grade 🎓</p>
            </div>
            
            <!-- TEMPORARY PLACEHOLDER PROFILE PIC -->
            <div class="profile-area" onclick="handleLogout()" title="Click to Log Out">
                <div class="avatar-placeholder">6B</div>
            </div>
        </header>

        <!-- Dynamic Grid -->
        <main id="friends-grid" class="grid">
            <!-- JavaScript inserts cards here -->
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
